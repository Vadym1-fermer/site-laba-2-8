{% extends "pages/base.html" %}

{% block content %}
    <section class="hero">
        <h1>{{ title }}</h1>
        {% if title == "Login" %}
            <a class="button" href="{% url 'pages:register' %}" data-uk="Зареєструватись" data-en="Register">Register</a>
            <a class="button" href="{% url 'pages:password_reset_request' %}" data-uk="Забули пароль?" data-en="Forgot password?">Forgot password?</a>
        {% elif title == "Register" %}
            <a class="button" href="{% url 'pages:login' %}" data-uk="Увійти" data-en="Login">Login</a>
        {% endif %}
    </section>

    <section class="form-panel">
        <form class="form-grid" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="submit-button" type="submit">{{ button_text }}</button>
        </form>
    </section>
{% endblock %}
