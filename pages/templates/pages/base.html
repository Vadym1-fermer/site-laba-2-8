<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1117;
            --surface: #161b22;
            --surface-soft: #1f2937;
            --text: #f3f4f6;
            --muted: #9ca3af;
            --accent: #38bdf8;
            --accent-strong: #22c55e;
            --border: #30363d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.6;
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-strong);
        }

        .site-header,
        .site-footer {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .site-footer {
            margin-top: 48px;
            border-top: 1px solid var(--border);
            border-bottom: 0;
        }

        .header-inner,
        .footer-inner,
        .page {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 18px 0;
        }

        .brand {
            color: var(--text);
            font-size: 22px;
            font-weight: 800;
        }

        .menu {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .menu a {
            display: inline-flex;
            align-items: center;
            min-height: 38px;
            padding: 0 12px;
            background: var(--surface-soft);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .category-select {
            min-height: 38px;
            padding: 0 12px;
            background: var(--surface-soft);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .page {
            padding: 44px 0 0;
        }

        h1 {
            margin: 0;
            font-size: 40px;
            line-height: 1.1;
        }

        h2,
        h3,
        p {
            margin-top: 0;
        }

        p {
            color: var(--muted);
            font-size: 18px;
        }

        .hero {
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .content-panel,
        .product-card {
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .product-card h3 {
            margin-bottom: 8px;
        }

        .product-meta {
            color: var(--muted);
            font-size: 15px;
        }

        .price {
            color: var(--accent-strong);
            font-size: 20px;
            font-weight: 800;
        }

        .footer-inner {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            padding: 24px 0;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .header-inner,
            .footer-inner {
                align-items: flex-start;
                grid-template-columns: 1fr;
                flex-direction: column;
            }

            h1 {
                font-size: 32px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a class="brand" href="{% url 'pages:home' %}">Clothing Store</a>

            <nav class="menu" aria-label="Main menu">
                <a href="{% url 'pages:home' %}">Home</a>
                {% for page in pages %}
                    <a href="{% url 'pages:'|add:page.url_name %}">{{ page.title }}</a>
                {% endfor %}
                <form action="{% url 'pages:home' %}" method="get">
                    <select class="category-select" name="category" onchange="this.form.submit()">
                        <option value="">All categories</option>
                        {% for category in categories %}
                            <option value="{{ category.id }}" {% if selected_category_id == category.id|stringformat:"s" %}selected{% endif %}>
                                {{ category.name }}
                            </option>
                        {% endfor %}
                    </select>
                </form>
            </nav>
        </div>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div>
                <strong>Clothing Store</strong>
                <p>Dark mode catalog for comfortable shopping and quick category browsing.</p>
            </div>
            <div>
                <p>Delivery, fitting, and size consultation.</p>
            </div>
        </div>
    </footer>
</body>
</html>
